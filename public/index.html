<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מפת התראות פיקוד העורף</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <section class="left-panel">
        <div id="map"></div>
      </section>
      <aside class="right-panel">
        <div class="panel-header">
          <h1>התראות פיקוד העורף</h1>
          <button id="settingsToggleBtn" class="settings-toggle-btn" type="button" title="הגדרות" aria-label="הגדרות">⚙</button>
        </div>
        <p id="statusLine">טוען נתונים...</p>

        <section class="card settings-card">
          <h2>הגדרות מיקום</h2>
          <div class="location-row">
            <input id="locationInput" list="cityOptions" placeholder="הקלד שם עיר" />
            <datalist id="cityOptions"></datalist>
            <button id="addLocationBtn" type="button">הוסף</button>
          </div>
          <div class="toggles-row">
            <label class="toggle-item">
              <input id="soundToggle" type="checkbox" checked />
              <span>הפעל/כבה צליל</span>
            </label>
            <label class="toggle-item">
              <input id="notificationToggle" type="checkbox" checked />
              <span>הפעל/כבה Notification</span>
            </label>
          </div>
          <div id="selectedLocations" class="tags"></div>
        </section>

        <section class="card">
          <h2>התראות פעילות / אחרונות</h2>
          <div id="testActionsRow" class="actions-row hidden">
            <button id="injectTestAlertsBtn" type="button">הזרק התראות בדיקה</button>
            <button id="clearTestAlertsBtn" type="button">כבה מצב בדיקה</button>
          </div>
          <div id="alertsList" class="alerts-list"></div>
        </section>

        <section id="apiConsoleCard" class="card hidden">
          <div class="console-header">
            <h2>קונסול API חי (אופציונלי)</h2>
            <button id="toggleApiConsoleBtn" type="button">הצג</button>
          </div>
          <div id="apiConsolePanel" class="api-console-panel hidden">
            <p class="meta">מציג את תגובת ה־API האחרונה בכל רענון.</p>
            <pre id="apiConsoleOutput" class="api-console-output">אין נתונים עדיין.</pre>
          </div>
        </section>

      </aside>
    </div>
    <div id="warningPopup" class="warning-popup hidden"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
